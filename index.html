<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="assets/viewport-fit.js"></script>
  <title>Featured · Code Life</title>
  <link rel="stylesheet" href="assets/global.css?v=2">
  <link rel="stylesheet" href="assets/components.css?v=121">

</head>
<body>

<div class="app">
  <header class="top-row"></header>
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="paper-board">
      <div class="cards-wrap">
        <section class="cards-area" id="cardsArea">
          <div class="cards-grid" id="grid"></div>
        </section>
        <div class="scrollbar" id="scrollbar">
          <div class="scrollbar-thumb" id="scrollThumb"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="assets/shell.js?v=42"></script>
<script src="assets/detail-popup.js?v=66"></script>
<script>
renderSidebar('recommend');
renderTopRow({ showFilter: true, showSort: true, showSearch: true, sortLabel: 'Latest' });

// 排序下拉项（官方推荐：综合 / 最新 / 最热）
buildSortPanel([
  { label: 'All' },
  { label: 'Latest' },
  { label: 'Hot' },
], 'Latest');

// 卡片
setupPagedCardGrid({
  grid: document.getElementById('grid'),
  items: makeMixedCards(36),
});
setupScrollbar();

/* ===== Filter弹窗（60% 遮罩）===== */
window.openFilter = function() {
  const mask = document.createElement('div');
  mask.className = 'modal-mask';
  mask.innerHTML = `
    <div class="modal-popup" onclick="event.stopPropagation()">
      <div class="modal-close"><img src="assets/img/btn-close.png" alt="Close"></div>
      <div class="modal-header">
        <img class="ic" src="assets/img/btn-filter-active.png" alt=""> Filter
      </div>

      <div class="filter-section">
        <div class="filter-options" style="grid-template-columns: 1fr;">
          <div class="filter-option active" data-key="canjoin">
            <span class="radio"></span>
            <span>Joinable</span>
          </div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label-row">
          <div class="filter-label">Type (multi)</div>
          <div class="filter-tip">Dreams only</div>
        </div>
        <div class="filter-options">
          <div class="filter-option"><span class="radio"></span><span>Official Pick</span></div>
          <div class="filter-option active"><span class="radio"></span><span>Studio</span></div>
          <div class="filter-option"><span class="radio"></span><span>Event Demo</span></div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label-row">
          <div class="filter-label">Players (multi)</div>
          <div class="filter-tip">RP rooms only</div>
        </div>
        <div class="filter-options">
          <div class="filter-option active"><span class="radio"></span><span>Solo</span></div>
          <div class="filter-option active"><span class="radio"></span><span>Duo</span></div>
          <div class="filter-option"><span class="radio"></span><span>3-6</span></div>
          <div class="filter-option"><span class="radio"></span><span>6+</span></div>
        </div>
      </div>

      <div class="filter-actions">
        <button class="btn-pill btn-reset">Reset</button>
        <button class="btn-pill btn-confirm">OK</button>
      </div>
    </div>
  `;
  document.body.appendChild(mask);

  const fb = document.getElementById('filterBtn');
  function close() { mask.remove(); }   // 关闭不改变图标

  mask.onclick = close;
  mask.querySelector('.modal-close').onclick = close;
  mask.querySelectorAll('.filter-option').forEach(opt => {
    opt.onclick = () => {
      opt.classList.toggle('active');
      if (fb) fb.querySelector('img').src = 'assets/img/btn-filter-active.png';
    };
  });
  mask.querySelector('.btn-reset').onclick = () => {
    mask.querySelectorAll('.filter-option').forEach(o => o.classList.remove('active'));
    if (fb) fb.querySelector('img').src = 'assets/img/btn-filter-default.png';
  };
  mask.querySelector('.btn-confirm').onclick = close;
};
</script>
</body>
</html>
